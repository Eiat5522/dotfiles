# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

## Set Starship Prompt Configuration Options:
# Set continuation prompt symbol.
continuation_prompt = '▶▶ '

# Inserts a blank line between shell prompts.
add_newline = false

# Timeout for starship to scan files (in milliseconds).
scan_timeout = 30

# Timeout for commands executed by starship (in milliseconds).
command_timeout = 500

## Set position and sequence of Starship prompt.
# Configure the format of the prompt.

format = """
$username\
$sudo\
$os\
$directory\
$vcsh\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
