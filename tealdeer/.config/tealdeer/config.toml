[style.description]
underline = false
bold = false
italic = false

[style.command_name]
foreground = "cyan"
underline = false
bold = false
italic = false

[style.example_text]
foreground = "green"
underline = false
bold = false
italic = false

[style.example_code]
foreground = "cyan"
underline = false
bold = false
italic = false

[style.example_variable]
foreground = "cyan"
underline = true
bold = false
italic = false

[display]
compact = false
use_pager = false

[search]
download_languages = ["en"]

[updates]
auto_update = false
#auto_update_interval_hours = 720
# mirror/tldr.sha256sums must point to the SHA256 checksums of all assets
# mirror/tldr-pages.LANGUAGE.zip must point to a zip archive that contains platform directories with pages in LANGUAGE
#archive_source = "https://github.com/tldr-pages/tldr"
languages = ["en"]
tls_backend = "rustls-with-native-roots"

[directories]
cache_dir = "/home/eiat/.cache/tealdeer/"
custom_pages_dir = "/home/eiat/.local/tealdeer/pages/"
